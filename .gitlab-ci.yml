image: node:20

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/
    - backend/node_modules/

build-frontend:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
  only:
    - main

pages:
  stage: deploy
  dependencies:
    - build-frontend
  script:
    - mkdir -p public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main

deploy-backend:
  stage: deploy
  script:
    - cd backend
    - npm install
    - npx wrangler d1 execute broono-db --file=./schema.sql --remote || echo "D1 execution failed - check if database exists"
    - npx wrangler deploy
  only:
    - main
